<!DOCTYPE html>
<html>
<head>
    <title>Downloading Dan's Portfolio...</title>
    <meta charset="utf-8">
</head>
<body>
    <p>If your download doesn't start automatically, <a href="https://dushanthdan.github.io/portfolio/DanPortfolio.pdf" download="DanPortfolio.pdf">click here</a>.</p>
    
    <script>
        window.onload = function() {
            // This creates a temporary hidden link
            var link = document.createElement('a');
            link.href = 'https://dushanthdan.github.io/portfolio/DanPortfolio.pdf'; 
            
            // This forces the download and suggests a clean file name
            link.download = 'Dushanth_Mahendran_Portfolio.pdf'; 
            
            // This virtually "clicks" the link for the user
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
</body>
</html>
